name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  quality:
    name: Lint, format & tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install
        run: pip install -e ".[dev,pipelines]"

      - name: Lint
        run: ruff check .

      - name: Format check
        run: ruff format --check .

      - name: Tests
        run: pytest

  security:
    name: Dependency scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install
        run: pip install -e ".[dev,pipelines]" pip-audit
      # Advisory: surfaces vulnerable dependencies on every run. Kept non-blocking
      # so an upstream advisory in a transitive/base package (pip, setuptools,
      # urllib3) doesn't red-gate unrelated work; triage from the logs and bump.
      - name: pip-audit
        continue-on-error: true
        run: pip-audit --desc --skip-editable
