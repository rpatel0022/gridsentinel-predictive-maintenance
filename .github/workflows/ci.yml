name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  quality:
    name: Lint, format & tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install
        run: pip install -e ".[dev,pipelines]"

      - name: Lint
        run: ruff check .

      - name: Format check
        run: ruff format --check .

      - name: Type check
        run: mypy src pipelines serving monitoring reports

      - name: Tests
        run: pytest

  coverage:
    name: Coverage (advisory)
    runs-on: ubuntu-latest
    # Non-blocking: a full-deps run reports real coverage but never red-gates the
    # badge — the lean `quality` job above is the gate.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install (full deps for full coverage)
        run: pip install -e ".[dev,pipelines,modeling,serving,dashboard]"
      - name: pytest --cov
        run: pytest --cov --cov-report=term-missing

  security:
    name: Dependency scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install
        run: pip install -e ".[dev,pipelines]" pip-audit
      # Advisory: surfaces vulnerable dependencies on every run. Kept non-blocking
      # so an upstream advisory in a transitive/base package (pip, setuptools,
      # urllib3) doesn't red-gate unrelated work; triage from the logs and bump.
      - name: pip-audit
        continue-on-error: true
        run: pip-audit --desc --skip-editable
