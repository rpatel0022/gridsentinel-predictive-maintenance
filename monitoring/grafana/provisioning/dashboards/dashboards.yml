# Auto-load dashboards from the mounted dashboards folder.
apiVersion: 1
providers:
  - name: gridsentinel
    orgId: 1
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: false
